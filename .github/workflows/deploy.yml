name: Build and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      webapp-digest: ${{ steps.build-webapp.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: image-names
        shell: bash
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "webapp=${{ env.REGISTRY }}/${owner_lc}/uncannyprompt-webapp" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for webapp
        id: meta-webapp
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-names.outputs.webapp }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push webapp
        id: build-webapp
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.webapp
          push: true
          tags: ${{ steps.meta-webapp.outputs.tags }}
          labels: ${{ steps.meta-webapp.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.image-names.outputs.webapp }}:buildcache
          cache-to: type=registry,ref=${{ steps.image-names.outputs.webapp }}:buildcache,mode=max
